version: "3.9"

services:
  scoring:
    build: .
    command: python scripts/start_scoring_service.py
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./ml/registry/artifacts:/app/ml/registry/artifacts

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - scoring
